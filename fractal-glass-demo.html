<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="description" content="Futuristic AI landing page inspired by fractal glass design. A sleek, modern interface that reflects intelligence, transparency, and next-generation artificial intelligence technology.">
   <meta name="robots" content="index, follow">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">

   <!--=============== FAVICON ===============-->
   <link rel="shortcut icon" href="assets/fractal-glass/img/favicon.png" type="image/x-icon">

   <!--=============== REMIXICONS ===============-->
   <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css">

   <!--=============== CSS ===============-->
   <link rel="stylesheet" href="assets/fractal-glass/css/styles.css">

   <title>Fractal Glass AI Landing Page | Bedimcode</title>
</head>
<body>
   <!--==================== HEADER ====================-->
   <header class="header" id="header">
      <nav class="nav container">
         <a href="#" class="nav__logo">
            <svg class="nav__logo-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
               <path d="M12 2L21 7V17L12 22L3 17V7L12 2Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
               <path d="M12 2V22M3 7L12 12L21 7" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
               <path d="M18.5 3.5L19.2 4.9L20.6 5.6L19.2 6.3L18.5 7.7L17.8 6.3L16.4 5.6L17.8 4.9L18.5 3.5Z" fill="currentColor"/>
            </svg>
            Toolbox
         </a>

         <div class="nav__menu" id="nav-menu">
            <ul class="nav__list">
               <li><a href="#" class="nav__link">Home</a></li>
               <li><a href="#" class="nav__link">Tools</a></li>
               <li><a href="#" class="nav__link">Prices</a></li>
               <li><a href="#" class="nav__link">Special</a></li>
               <li><a href="#" class="nav__link">Contact</a></li>
            </ul>
            <div class="nav__close" id="nav-close">
               <i class="ri-close-line"></i>
            </div>
         </div>

         <div class="nav__toggle" id="nav-toggle">
            <i class="ri-menu-line"></i>
         </div>
      </nav>
   </header>

   <!--==================== MAIN ====================-->
   <main class="main">
      <!--==================== HOME ====================-->
      <section class="home" id="home">
         <img src="assets/fractal-glass/img/ellipse-gradients.png" alt="" class="home__bg">

         <div class="home__container container">
            <svg class="home__icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
               <path d="M12 2L21 7V17L12 22L3 17V7L12 2Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
               <path d="M12 2V22M3 7L12 12L21 7" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
               <path d="M18.5 3.5L19.2 4.9L20.6 5.6L19.2 6.3L18.5 7.7L17.8 6.3L16.4 5.6L17.8 4.9L18.5 3.5Z" fill="currentColor"/>
            </svg>

            <h1 class="home__title">Build with the <br> AI Smart Toolbox</h1>

            <p class="home__description">
               Create and connect intelligent IA tools to boost the work
               of developers and businesses, connecting multiple AI
               configurations and accelerating workflow between users.
            </p>

            <div class="home__buttons">
               <a href="#" class="button button--white">Apply for Beta</a>
               <a href="#" class="button button--ghost">Learn More</a>
            </div>
         </div>
      </section>
   </main>

   <!--=============== GSAP ===============-->
   <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.1/dist/gsap.min.js"></script>
   <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.1/dist/SplitText.min.js"></script>

   <!--=============== MAIN JS ===============-->
   <script src="assets/fractal-glass/js/main.js"></script>
</body>
</html>
